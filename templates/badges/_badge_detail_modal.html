<div class="badge-detail-modal" data-badge-detail-modal hidden>
    <div class="badge-detail-modal__backdrop" data-badge-detail-close></div>
    <div
        class="badge-detail-modal__dialog"
        id="badge-detail-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="badge-detail-modal-title"
        tabindex="-1"
    >
        <button
            type="button"
            class="badge-detail-modal__close"
            data-badge-detail-close
            data-badge-detail-initial-focus
            aria-label="Close badge details"
        >
            &times;
        </button>
        <div class="badge-detail-modal__content" data-badge-detail-content></div>
    </div>
</div>
