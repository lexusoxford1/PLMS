<svg class="achievement-medallion__icon-svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
    {% if badge.visual_spec.icon == "trail" %}
        <path d="M14 42c8-15 18-24 30-28" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <circle cx="18" cy="44" r="5" fill="currentColor"/>
        <circle cx="33" cy="27" r="4" fill="currentColor" opacity="0.9"/>
        <circle cx="47" cy="15" r="3.5" fill="currentColor" opacity="0.75"/>
    {% elif badge.visual_spec.icon == "supernova" %}
        <circle cx="32" cy="32" r="7" fill="currentColor"/>
        <path d="M32 10v10M32 44v10M10 32h10M44 32h10M16 16l7 7M41 41l7 7M48 16l-7 7M23 41l-7 7" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    {% elif badge.visual_spec.icon == "pulse" %}
        <path d="M10 34h11l5-10 7 18 7-13h14" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="10" y="16" width="44" height="32" rx="12" stroke="currentColor" stroke-width="3" opacity="0.35"/>
    {% elif badge.visual_spec.icon == "prism" %}
        <path d="M32 12 16 24l6 24h20l6-24-16-12Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <path d="M32 12v36M16 24h32M22 48l10-24 10 24" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    {% elif badge.visual_spec.icon == "launch" %}
        <path d="M38 12c7 3 12 8 14 15-4 3-8 5-12 5l-6 6-8-8 6-6c0-4 2-8 6-12Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <path d="M24 38 15 49M22 46l-7 3 3-7" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="41" cy="23" r="3" fill="currentColor"/>
    {% elif badge.visual_spec.icon == "compass" %}
        <circle cx="32" cy="32" r="18" stroke="currentColor" stroke-width="4"/>
        <path d="M39 25 35 35 25 39l4-10 10-4Z" fill="currentColor"/>
        <circle cx="32" cy="32" r="3.2" fill="white"/>
    {% elif badge.visual_spec.icon == "stack" %}
        <path d="M16 24 32 16l16 8-16 8-16-8Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <path d="m20 32 12 6 12-6M20 40l12 6 12-6" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    {% elif badge.visual_spec.icon == "spark" %}
        <path d="M32 13 36 25 48 29 36 33 32 45 28 33 16 29 28 25 32 13Z" fill="currentColor"/>
        <path d="M48 14v8M52 18h-8M15 42v6M18 45h-6" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    {% elif badge.visual_spec.icon == "bolt" %}
        <path d="M35 10 18 34h10l-4 20 18-27H32l3-17Z" fill="currentColor"/>
    {% elif badge.visual_spec.icon == "target" %}
        <circle cx="32" cy="32" r="18" stroke="currentColor" stroke-width="4"/>
        <circle cx="32" cy="32" r="10" stroke="currentColor" stroke-width="4"/>
        <circle cx="32" cy="32" r="4" fill="currentColor"/>
        <path d="M45 19 52 12" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    {% elif badge.visual_spec.icon == "trophy" %}
        <path d="M24 14h16v8a8 8 0 0 1-16 0v-8Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <path d="M20 16h-5a5 5 0 0 0 5 8M44 16h5a5 5 0 0 1-5 8" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M32 30v10M24 50h16M27 40h10" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
    {% elif badge.visual_spec.icon == "crown" %}
        <path d="m14 44 4-22 14 12 14-12 4 22H14Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <circle cx="18" cy="20" r="3" fill="currentColor"/>
        <circle cx="32" cy="12" r="3" fill="currentColor"/>
        <circle cx="46" cy="20" r="3" fill="currentColor"/>
    {% else %}
        <path d="M32 11 18 16v13c0 11 6 19 14 24 8-5 14-13 14-24V16L32 11Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <path d="m24 32 5 5 11-12" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    {% endif %}
</svg>
